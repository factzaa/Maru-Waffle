<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>จัดการรายการสต๊อก · Maru Waffle</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#FFC629">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700;800&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.mg-row{background:#fff;border-radius:12px;padding:11px 13px;margin-bottom:8px;}
.mg-row .top{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;}
.mg-row .top .nm{flex:1;font-family:'Kanit';font-weight:600;font-size:14px;color:var(--ink);}
.mg-row .top .id{font-size:11px;color:var(--ink-2);font-family:monospace;}
.mg-row .fields{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;align-items:end;}
.mg-row .fields label{font-size:11px;color:var(--ink-2);font-weight:600;display:block;margin-bottom:3px;}
.mg-row .fields input,.mg-row .fields select{width:100%;border:1.5px solid var(--line);border-radius:9px;padding:7px 10px;font-size:13px;font-family:'Kanit';background:#fff;}
.mg-row .fields input[type=number]{text-align:right;font-weight:600;}
.mg-row .saved-tick{color:var(--green-ok);font-size:11px;font-weight:700;display:none;}
.mg-row.saved .saved-tick{display:inline;}
</style>
</head>
<body>

<div class="app">
  <div class="head">
    <img class="logo" src="icon-192.png" alt="">
    <h1>จัดการรายการ</h1>
    <div class="sub">Maru Waffle · ตั้งค่าสต๊อกขั้นต่ำและโหมด</div>
  </div>

  <div class="sheet">
    <div class="card">
      <div class="h"><span class="ic" style="background:linear-gradient(135deg,#A78BFA,#6D28D9);" data-icon="edit"></span>จัดการรายการสต๊อก</div>
      <p style="font-size:13px;color:var(--ink-2);margin-bottom:14px;line-height:1.55;">
        ตั้งค่า <b>สต๊อกขั้นต่ำ</b> (สำหรับแจ้งเตือนของใกล้หมด) และ <b>โหมด</b> ของแต่ละรายการ<br>
        · <b>withdraw</b> = คีย์เบิกระหว่างวัน (ของชิ้น/ถุง/ขวด)<br>
        · <b>count</b> = นับคงเหลือสิ้นวัน (กรัม/ml — ต้องชั่ง)
      </p>

      <div class="stock-filters" id="mgrCatChips" style="background:transparent;padding:0;">
        <button class="stock-cat-chip on" data-cat="all">ทั้งหมด</button>
        <button class="stock-cat-chip" data-cat="Waffle">🧁 Waffle</button>
        <button class="stock-cat-chip" data-cat="KUFF">🥐 KUFF</button>
        <button class="stock-cat-chip" data-cat="Drink">🥤 Drink</button>
        <button class="stock-cat-chip" data-cat="Other">📦 อื่นๆ</button>
      </div>
      <div class="stock-filters">
        <input type="search" id="mgrSearch" placeholder="ค้นหารายการ...">
      </div>

      <div id="mgrList"><div style="text-align:center;color:var(--ink-2);padding:20px;font-size:13px;">กำลังโหลด...</div></div>
    </div>
    <div class="foot">🐤 บันทึกการตั้งค่าทีละรายการ</div>
  </div>
</div>

<script src="shared.js"></script>
<script>
injectShell('stockManage');
registerSW();

let mgrData = { items: [], filter: { cat: 'all', q: '' } };

function loadStockManage(){
  document.getElementById('mgrList').innerHTML = '<div style="text-align:center;color:var(--ink-2);padding:20px;font-size:13px;">กำลังโหลด...</div>';
  api('getStockItems', {})
    .then(function(res){ mgrData.items = res.items || []; renderMgrList(); })
    .catch(function(err){
      document.getElementById('mgrList').innerHTML = '<div style="color:var(--red);padding:14px;font-size:13px;">โหลดไม่ได้: '+escHtml(err.message)+'<br><br>ถ้ายังไม่ได้รัน <code>setupStock</code> ใน Apps Script ให้รันก่อน</div>';
    });
}
function renderMgrList(){
  const q = (mgrData.filter.q || '').toLowerCase();
  const cat = mgrData.filter.cat;
  const filtered = mgrData.items.filter(function(it){
    if(cat !== 'all' && it.category !== cat) return false;
    if(q && it.name.toLowerCase().indexOf(q) < 0) return false;
    return true;
  });
  const box = document.getElementById('mgrList');
  if(!filtered.length){ box.innerHTML = '<div style="text-align:center;color:var(--ink-2);padding:20px;font-size:13px;">ไม่พบรายการ</div>'; return; }
  box.innerHTML = filtered.map(function(it){
    return '<div class="mg-row" data-id="'+it.id+'">'
      +'<div class="top"><div class="nm">'+escHtml(it.name)+'</div><div class="id">'+it.id+'</div></div>'
      +'<div class="fields">'
        +'<div><label>หน่วย</label><input type="text" data-f="unit" value="'+escHtml(it.unit)+'"></div>'
        +'<div><label>โหมด</label><select data-f="mode"><option value="withdraw"'+(it.mode==='withdraw'?' selected':'')+'>คีย์เบิก (ของชิ้น)</option><option value="count"'+(it.mode==='count'?' selected':'')+'>นับสิ้นวัน (กรัม/ml)</option></select></div>'
        +'<div><label>สต๊อกขั้นต่ำ (เตือนใกล้หมด)</label><input type="number" min="0" step="any" data-f="minStock" value="'+it.minStock+'"></div>'
        +'<div><label>สถานะ</label><select data-f="active"><option value="true"'+(it.active!==false?' selected':'')+'>ใช้งาน</option><option value="false"'+(it.active===false?' selected':'')+'>หยุดใช้</option></select></div>'
      +'</div>'
      +'<div style="display:flex;justify-content:flex-end;gap:10px;margin-top:10px;align-items:center;">'
        +'<span class="saved-tick">✓ บันทึกแล้ว</span>'
        +'<button type="button" class="rcpt-btn done mg-save" data-id="'+it.id+'">บันทึก</button>'
      +'</div>'
    +'</div>';
  }).join('');
  box.querySelectorAll('.mg-save').forEach(function(btn){
    btn.addEventListener('click', function(){ saveMgrItem(btn.dataset.id); });
  });
}
function saveMgrItem(id){
  const row = document.querySelector('.mg-row[data-id="'+id+'"]'); if(!row) return;
  const data = { id: id };
  row.querySelectorAll('[data-f]').forEach(function(el){
    const f = el.dataset.f;
    if(f === 'active') data[f] = el.value === 'true';
    else if(f === 'minStock') data[f] = parseFloat(el.value)||0;
    else data[f] = el.value;
  });
  const btn = row.querySelector('.mg-save'); btn.disabled=true; btn.textContent='กำลังบันทึก...';
  api('saveStockItem', { data: data })
    .then(function(res){
      btn.disabled=false; btn.textContent='บันทึก';
      row.classList.add('saved');
      setTimeout(function(){ row.classList.remove('saved'); }, 2000);
      const idx = mgrData.items.findIndex(function(x){return x.id===id;});
      if(idx>=0) Object.assign(mgrData.items[idx], data);
    })
    .catch(function(err){
      btn.disabled=false; btn.textContent='บันทึก';
      toast('ผิดพลาด: '+err.message);
    });
}
document.getElementById('mgrSearch').addEventListener('input', function(){
  mgrData.filter.q = this.value; renderMgrList();
});
document.querySelectorAll('#mgrCatChips .stock-cat-chip').forEach(function(b){
  b.addEventListener('click', function(){
    document.querySelectorAll('#mgrCatChips .stock-cat-chip').forEach(function(x){x.classList.remove('on');});
    b.classList.add('on');
    mgrData.filter.cat = b.dataset.cat;
    renderMgrList();
  });
});

renderIcons();
loadStockManage();
</script>
</body>
</html>
